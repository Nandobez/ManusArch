[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:xvfb]
command=/usr/bin/Xvfb :1 -screen 0 1280x720x24
autorestart=true
priority=100

[program:fluxbox]
command=/usr/bin/fluxbox
environment=DISPLAY=":1"
autorestart=true
priority=200

[program:x11vnc]
command=/usr/bin/x11vnc -display :1 -forever -shared -nopw -rfbport 5900
autorestart=true
priority=300

[program:novnc]
command=/usr/share/novnc/utils/novnc_proxy --vnc localhost:5900 --listen 6080
autorestart=true
priority=400

[program:browser_server]
command=/opt/venv/bin/python3 /opt/sandbox_scripts/browser_server.py
environment=DISPLAY=":1"
directory=/workspace
autorestart=true
priority=500
stdout_logfile=/var/log/supervisor/browser_server.log
stderr_logfile=/var/log/supervisor/browser_server_err.log
